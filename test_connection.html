<!DOCTYPE html>
<html>
<head>
    <title>Test Flask Connection</title>
</head>
<body>
    <h1>Testing Flask Server Connection</h1>
    <button onclick="testConnection()">Test Connection</button>
    <div id="result"></div>
    
    <script>
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // Test health endpoint
                const response = await fetch('https://multiovulated-londyn-nonanarchically.ngrok-free.dev/health');
                const data = await response.json();
                resultDiv.innerHTML = `<p style="color: green;">✅ SUCCESS! Server is running.</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">❌ ERROR: ${error.message}</p><p>Make sure your ngrok tunnel is active and you are using the correct ngrok URL.</p>`;
            }
        }
        
        // Auto-test on load
        window.onload = testConnection;
    </script>
</body>
</html>
